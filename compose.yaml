services:
  isambard-app:
    image: isambard-app:latest
    platform: linux/amd64
    container_name: isambard-app
    restart: unless-stopped
    depends_on:
      - isambard-guacd
      - isambard-guacamole
      - isambard-browser
    ports:
      - "8765:8765"
    environment:
      - BROWSER_URL=${ISAMBARD_BROWSER_URL:-http://localhost:${ISAMBARD_BROWSER_PORT:-8766}}
      - BROWSER_USER=${ISAMBARD_BROWSER_USER:-guac}
      - BROWSER_PASSWORD=${ISAMBARD_BROWSER_PASSWORD:-guac}
    volumes:
      - /data/crimson/media:/app/downloads

  isambard-guacd:
    image: guacamole/guacd:1.6.0
    platform: linux/amd64
    container_name: isambard-guacd
    restart: unless-stopped

  isambard-guacamole:
    image: guacamole/guacamole:1.6.0
    platform: linux/amd64
    container_name: isambard-guacamole
    restart: unless-stopped
    depends_on:
      - isambard-guacd
      - isambard-browser
    ports:
      - "${ISAMBARD_BROWSER_PORT:-8766}:8080"
    environment:
      - GUACD_HOSTNAME=isambard-guacd
      - WEBAPP_CONTEXT=ROOT
    volumes:
      - /data/crimson/config/isambard/guacamole/user-mapping.xml:/etc/guacamole/user-mapping.xml:ro

  isambard-browser:
    image: isambard-browser:latest
    platform: linux/amd64
    container_name: isambard-browser
    restart: unless-stopped
    shm_size: 1gb
