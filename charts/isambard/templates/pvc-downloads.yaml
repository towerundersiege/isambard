{{- if and .Values.persistence.downloads.enabled (not .Values.persistence.downloads.nfs.enabled) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "isambard.fullname" . }}-downloads
  labels:
    {{- include "isambard.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.downloads.accessMode }}
  resources:
    requests:
      storage: {{ .Values.persistence.downloads.size }}
  {{- if .Values.persistence.downloads.storageClassName }}
  storageClassName: {{ .Values.persistence.downloads.storageClassName }}
  {{- end }}
{{- end }}
